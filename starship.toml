"$schema" = 'https://starship.rs/config-schema.json'

format = """
[вЦСвЦТвЦУ](#5fd0ff)\
[оЬС will](bg:#5fd0ff fg:#ffffff)\
[оВі](bg:#6ea8ff fg:#5fd0ff)\
$directory\
[оВі](fg:#6ea8ff bg:#8b7dff)\
$git_branch\
$git_status\
[оВі](fg:#8b7dff bg:#d16dff)\
$nodejs\
$bun\
$rust\
$golang\
$php\
[оВі](fg:#d16dff bg:#e879f9)\
$time\
[оВі](fg:#e879f9)$character
"""

[directory]
style = "fg:#ffffff bg:#6ea8ff"
format = "[$path]($style)"
truncation_length = 3
truncation_symbol = "вА¶/"

[directory.substitutions]
"Documents" = "у∞ИЩ"
"Downloads" = "пАЩ"
"Music" = "пАБ"
"Pictures" = "пАЊ"

[git_branch]
symbol = "пРШ"
style = "bg:#8b7dff"
format = '[ $symbol$branch](fg:#ffffff bg:#8b7dff)'

[git_status]
style = "bg:#8b7dff"
format = '[($all_status$ahead_behind)](fg:#ffffff bg:#8b7dff)'

[nodejs]
symbol = "оЬШ"
style = "bg:#d16dff"
format = '[ $symbol($version)](fg:#ffffff bg:#d16dff)'

[bun]
symbol = "оЭѓ"
style = "bg:#d16dff"
format = '[ $symbol($version)](fg:#ffffff bg:#d16dff)'

[rust]
symbol = "оЮ®"
style = "bg:#d16dff"
format = '[ $symbol($version)](fg:#ffffff bg:#d16dff)'

[golang]
symbol = "оШІ"
style = "bg:#d16dff"
format = '[ $symbol($version)](fg:#ffffff bg:#d16dff)'

[php]
symbol = "оШИ"
style = "bg:#d16dff"
format = '[ $symbol($version)](fg:#ffffff bg:#d16dff)'

[time]
disabled = false
time_format = "%R"
style = "bg:#e879f9"
format = '[пРЇ $time](fg:#ffffff bg:#e879f9)'

[character]
success_symbol = "[вЭѓ](#1a1a1a)"
error_symbol = "[вЭѓ](#ff6b81)"
